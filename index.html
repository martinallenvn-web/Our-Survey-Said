<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Survey Said... - Template Builder</title>
<style>
    :root {
        --bg-dark: #000a20;
        --bg-light: #001f5c;
        --accent-gold: #ffcc00;
        --accent-cyan: #00ffff;
        --tile-bg: linear-gradient(to bottom, #0033cc, #001a66);
        --font-main: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body {
        margin: 0;
        font-family: var(--font-main);
        background: radial-gradient(circle at center, var(--bg-light), var(--bg-dark));
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Fixed location controls (Inline styles added below for bulletproof positioning) */
    .footer-controls {
        z-index: 2000;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background: rgba(0,0,0,0.5);
        border-bottom: 2px solid var(--accent-cyan);
    }

    .header-controls {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    button, select, input {
        font-family: var(--font-main);
        padding: 8px 12px;
        border-radius: 4px;
        border: 1px solid var(--accent-cyan);
        background: #001133;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }
    
    button:hover { background: #002266; }
    .btn-gold { border-color: var(--accent-gold); color: var(--accent-gold); }
    .btn-gold:hover { background: #332200; }
    
    .btn-strike { border-color: red; color: red; font-size: 1.2em; }
    .btn-strike:hover { background: #330000; }

    #app-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    .game-header { text-align: center; margin-bottom: 20px; }
    .game-header h2 { font-size: 2em; margin: 0 0 15px 0; text-transform: uppercase; color: white; text-shadow: 2px 2px 4px black; }

    .board { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: 1; }

    .tile {
        background: var(--tile-bg);
        border: 3px solid var(--accent-cyan);
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        display: flex;
        align-items: stretch;
        cursor: pointer;
        overflow: hidden;
        position: relative;
        min-height: 80px;
        transition: transform 0.1s;
    }
    .tile:active { transform: scale(0.98); }

    .tile-hidden { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 3em; color: var(--accent-gold); text-shadow: 0 0 15px var(--accent-gold); font-weight: bold; }
    .tile-revealed { flex: 1; display: flex; }
    .tile-text { flex: 1; padding: 10px 20px; font-size: 1.5em; display: flex; align-items: center; text-transform: uppercase; font-weight: bold; }
    .tile-points { width: 100px; background: #000; border-left: 3px solid var(--accent-cyan); display: flex; align-items: center; justify-content: center; font-size: 2em; color: var(--accent-cyan); font-weight: bold; }

    .award-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; gap: 10px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .tile:hover .award-overlay.active-overlay { opacity: 1; pointer-events: auto; }
    .award-overlay p { margin: 0 10px 0 0; font-size: 1.2em; }
    
    .team-btn { background: var(--accent-gold); color: black; border: none; font-size: 1.2em; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    .team-btn:hover { background: white; }
    
    .awarded-tag { position: absolute; bottom: 5px; right: 105px; font-size: 0.8em; color: var(--accent-gold); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; }

    .scoreboard { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
    .team-score { background: rgba(0,0,0,0.6); border: 2px solid var(--accent-gold); border-radius: 8px; padding: 10px 20px; text-align: center; min-width: 150px; }
    .team-name { font-size: 1.2em; color: var(--accent-gold); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; cursor: pointer; text-decoration: underline; padding: 5px; }
    .team-points { font-size: 2.5em; font-weight: bold; }
    .score-adj { display: flex; justify-content: space-between; margin-top: 10px; }
    .score-adj button { padding: 2px 10px; font-size: 1em; }

    .setup-container { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 8px; border: 2px solid var(--accent-gold); max-width: 900px; margin: 0 auto; width: 100%; }
    .setup-header-fields { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; background: #001133; padding: 20px; border-radius: 8px; border: 1px solid var(--accent-cyan); }
    .setup-header-fields label { display: flex; flex-direction: column; font-size: 1.2em; color: var(--accent-gold); }
    .setup-header-fields input { margin-top: 8px; font-size: 1.2em; padding: 10px; }
    .prep-round { background: #001133; padding: 20px; margin-bottom: 20px; border: 1px solid var(--accent-cyan); border-radius: 8px; }
    .prep-round input[type="text"] { width: 100%; margin-bottom: 10px; font-size: 1.2em; }
    .prep-answer-row { display: flex; gap: 10px; margin-bottom: 5px; align-items: center; }
    .prep-answer-row input[type="text"] { flex: 1; margin: 0; font-size: 1em; }
    .prep-answer-row input[type="number"] { width: 80px; font-size: 1em; }

    .splash-container, .htp-container { background: rgba(0,0,0,0.8); padding: 40px; border-radius: 8px; border: 2px solid var(--accent-cyan); max-width: 800px; margin: 40px auto; text-align: center; box-shadow: 0 0 30px rgba(0,255,255,0.2); }
    .splash-container h1 { color: var(--accent-gold); font-size: 4em; margin-bottom: 10px; text-transform: uppercase;}
    .splash-container h2 { color: var(--accent-cyan); font-size: 1.8em; margin-bottom: 30px; font-weight: normal;}
    .splash-image { max-height: 300px; max-width: 100%; border-radius: 8px; border: 3px solid var(--accent-gold); margin-bottom: 20px;}
    
    .htp-container h1 { color: var(--accent-gold); font-size: 3em; margin-bottom: 10px; text-transform: uppercase;}
    .htp-container h2 { color: var(--accent-cyan); font-size: 1.5em; margin-bottom: 30px; font-weight: normal;}
    .htp-rules { text-align: left; font-size: 1.2em; line-height: 1.6; background: #001133; padding: 20px 40px; border-radius: 8px; border: 1px solid #555; }
    .htp-rules ul { padding-left: 20px; }
    .htp-rules li { margin-bottom: 15px; }
    
    .strike-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); color: red; font-size: 40vw; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 50px darkred; pointer-events: none; opacity: 0; z-index: 1000; transition: opacity 0.1s; font-family: sans-serif; font-weight: bold; }
    .strike-active { opacity: 1; }
    
    .copyright { text-align: center; padding: 15px; font-size: 0.85em; color: #888; background: #000; margin-top: auto; }

</style>
</head>
<body>

<header id="main-header" style="display:none;">
    <div>
        <h1 id="header-title" style="margin: 0; font-size: 1.5em; color: var(--accent-gold); text-shadow: 0 0 5px var(--accent-gold);"></h1>
    </div>
    <div class="header-controls">
        <label>Teams: 
            <select id="teamCountSelect" onchange="changeTeamCount(this.value)">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
            </select>
        </label>
    </div>
</header>

<div id="app-container"></div>

<div class="footer-controls" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; gap: 10px;">
    <button id="setupToggleBtn" onclick="toggleSetup()" style="border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(0,0,0,0.8);">⚙️ Setup / Answers</button>
    <button id="muteBtn" onclick="toggleMute()" style="border-color: #888; color: #ddd; background: rgba(0,0,0,0.7);">🔊 Mute</button>
    <button id="fsBtn" onclick="toggleFullScreen()" style="border-color: #888; color: #ddd; background: rgba(0,0,0,0.7);">⛶ Full Screen</button>
</div>

<div id="strikeOverlay" class="strike-overlay">X</div>

<footer class="copyright">
    © 2026 Martin Allen. All rights reserved. Free for classroom use; duplication or distribution of the source code is prohibited.
</footer>

<script id="game-data" type="application/json">
{}
</script>

<script id="main-script">
    const IS_SETUP = true; // EXPORT_FLAG
    let EXPORTED_DATA = null; 

    // Robust parsing of the injected game data to prevent download syntax crashes
    try {
        const dataElement = document.getElementById('game-data');
        if (dataElement && dataElement.textContent.trim().length > 5) {
            EXPORTED_DATA = JSON.parse(dataElement.textContent.trim());
        }
    } catch(e) {
        console.error("Data parse error", e);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMuted = false;

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').innerText = isMuted ? '🔇 Unmute' : '🔊 Mute';
    }
    
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log("Error attempting to enable full-screen mode: " + err.message);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }
    
    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('fsBtn');
        if (document.fullscreenElement) {
            btn.innerText = "✖ Exit Full Screen";
        } else {
            btn.innerText = "⛶ Full Screen";
        }
    });

    function initAudio() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playPing() {
        if(isMuted) return;
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playTopPing() {
        if(isMuted) return;
        initAudio();
        const playChime = (freq, delay) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + 0.6);
        };
        playChime(880, 0);     
        playChime(1108.73, 0.1); 
        playChime(1318.51, 0.2); 
    }

    function playStrike() {
        if(isMuted) return;
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(250, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    let state = {
        mode: IS_SETUP ? 'setup' : 'splash',
        teams: 3,
        teamNames: ['Team 1', 'Team 2', 'Team 3', 'Team 4'],
        scores: [0, 0, 0, 0],
        currentRound: 0,
        boardState: Array(8).fill().map(() => ({ revealed: false, awardedTo: null }))
    };

    let previousMode = 'splash';

    let gameTitle = EXPORTED_DATA ? EXPORTED_DATA.title : "Our Survey Said...";
    let gameSubtitle = EXPORTED_DATA ? EXPORTED_DATA.subtitle : "Language Focus: e.g., Present Perfect";
    let gameImage = EXPORTED_DATA ? EXPORTED_DATA.image : null;
    let rounds = EXPORTED_DATA ? EXPORTED_DATA.rounds : [
        {
            question: "Dummy Question: Name a...",
            answers: [
                { text: "Dummy Answer 1", points: 40 },
                { text: "Dummy Answer 2", points: 30 },
                { text: "Dummy Answer 3", points: 15 },
                { text: "Dummy Answer 4", points: 10 },
                { text: "Dummy Answer 5", points: 5 },
                { text: "", points: 0 },
                { text: "", points: 0 },
                { text: "", points: 0 }
            ]
        }
    ];
    
    if (EXPORTED_DATA && EXPORTED_DATA.teamNames) {
        state.teamNames = EXPORTED_DATA.teamNames;
        state.teams = EXPORTED_DATA.teamNames.length;
    }

    function toggleSetup() {
        if (state.mode === 'setup') {
            syncSetupState();
            state.mode = (previousMode !== 'setup') ? previousMode : 'splash';
        } else {
            previousMode = state.mode;
            state.mode = 'setup';
        }
        render();
    }

    function changeTeamCount(count) {
        state.teams = parseInt(count);
        if (state.teamNames.length < state.teams) {
            for (let i = state.teamNames.length; i < state.teams; i++) {
                state.teamNames.push(`Team ${i+1}`);
            }
        }
        render();
    }
    
    function editTeamName(idx) {
        const newName = prompt("Enter new name for " + state.teamNames[idx], state.teamNames[idx]);
        if(newName !== null && newName.trim() !== "") {
            state.teamNames[idx] = newName;
            render();
        }
    }
    
    function goToHowToPlay() { 
        state.mode = 'how_to_play'; 
        previousMode = state.mode;
        render(); 
    }

    function startGame() { 
        state.mode = 'game'; 
        previousMode = state.mode;
        initAudio(); 
        render(); 
    }

    function selectRound(index) { 
        state.currentRound = parseInt(index); 
        state.boardState = Array(8).fill().map(() => ({ revealed: false, awardedTo: null })); 
        render(); 
    }

    function triggerStrike() {
        playStrike();
        const overlay = document.getElementById('strikeOverlay');
        overlay.classList.add('strike-active');
        setTimeout(() => overlay.classList.remove('strike-active'), 1000);
    }

    function revealTile(index) {
        if (!state.boardState[index].revealed) {
            state.boardState[index].revealed = true;
            if (index === 0) playTopPing();
            else playPing();
            render();
        }
    }

    function awardPoints(tileIndex, teamIndex, points, e) {
        e.stopPropagation();
        if (state.boardState[tileIndex].awardedTo === null) {
            state.scores[teamIndex] += points;
            state.boardState[tileIndex].awardedTo = teamIndex + 1;
            render();
        }
    }

    function manualScoreAdj(teamIndex, amount) {
        state.scores[teamIndex] += amount;
        render();
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                gameImage = e.target.result;
                const preview = document.getElementById('image-preview');
                preview.src = gameImage;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    function syncSetupState() {
        gameTitle = document.getElementById('setup-title').value;
        gameSubtitle = document.getElementById('setup-subtitle').value;
        
        const nameInputs = document.querySelectorAll('.team-name-input');
        nameInputs.forEach((input, i) => {
            state.teamNames[i] = input.value || `Team ${i+1}`;
        });

        const gatheredRounds = [];
        const roundDivs = document.querySelectorAll('.prep-round');
        roundDivs.forEach((div) => {
            const q = div.querySelector('.q-input').value;
            const answers = [];
            const ansRows = div.querySelectorAll('.prep-answer-row');
            ansRows.forEach(row => {
                const t = row.querySelector('.a-text').value;
                const p = parseFloat(row.querySelector('.a-pts').value) || 0;
                answers.push({text: t, points: p});
            });
            gatheredRounds.push({question: q, answers: answers});
        });
        rounds = gatheredRounds;
    }

    function addRound() {
        syncSetupState();
        rounds.push({ question: "New Question...", answers: Array(8).fill().map(() => ({ text: "", points: 0 })) });
        render();
    }

    function deleteRound(rIndex) {
        if(confirm("Are you sure you want to delete this round?")) {
            syncSetupState();
            rounds.splice(rIndex, 1);
            if (state.currentRound >= rounds.length) {
                state.currentRound = Math.max(0, rounds.length - 1);
            }
            render();
        }
    }

    function exportGame() {
        syncSetupState();
        const dataObj = { title: gameTitle, subtitle: gameSubtitle, image: gameImage, rounds: rounds, teamNames: state.teamNames };
        
        // Escape brackets safely for script tags to prevent XSS/Parser breaks
        const dataStr = JSON.stringify(dataObj).replace(/</g, '\\u003c').replace(/>/g, '\\u003e');
        
        // Clean clone of the entire document to strip transient states
        const clone = document.documentElement.cloneNode(true);
        
        const appCont = clone.querySelector('#app-container');
        if (appCont) appCont.innerHTML = '';
        
        const hTitle = clone.querySelector('#header-title');
        if (hTitle) hTitle.innerText = '';
        
        const mHeader = clone.querySelector('#main-header');
        if (mHeader) mHeader.style.display = 'none';
        
        const sOverlay = clone.querySelector('#strikeOverlay');
        if (sOverlay) sOverlay.classList.remove('strike-active');
        
        // Vigorously strip out empty text nodes in the body to eliminate rogue characters (\n\n)
        const body = clone.querySelector('body');
        if (body) {
            Array.from(body.childNodes).forEach(node => {
                if (node.nodeType === Node.TEXT_NODE && node.nodeValue.trim() === '') {
                    node.remove();
                }
            });
        }
        
        // Inject the stringified data explicitly into a data island to prevent JS syntax crash
        const dataScript = clone.querySelector('#game-data');
        if (dataScript) {
            dataScript.textContent = dataStr;
        }
        
        // Flip the launch flag natively
        const mainScript = clone.querySelector('#main-script');
        if (mainScript) {
            mainScript.textContent = mainScript.textContent.replace(/const IS_SETUP\s*=\s*(true|false);\s*\/\/\s*EXPORT_FLAG/, "const IS_SETUP = false; // EXPORT_FLAG");
        }
        
        // Rebuild clean HTML
        let htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;
        
        const blob = new Blob([htmlContent], {type: "text/html;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safeTitle = gameTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        a.download = safeTitle ? safeTitle + "_game.html" : "custom_game.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function render() {
        const container = document.getElementById('app-container');
        const header = document.getElementById('main-header');
        const setupToggleBtn = document.getElementById('setupToggleBtn');
        document.title = gameTitle;

        if (state.mode === 'setup') {
            header.style.display = 'none';
            setupToggleBtn.innerText = "▶️ Return to Game";
            renderSetup(container);
        } else {
            setupToggleBtn.innerText = "⚙️ Setup / Answers";
            if (state.mode === 'splash') {
                header.style.display = 'none';
                renderSplash(container);
            } else if (state.mode === 'how_to_play') {
                header.style.display = 'none';
                renderHowToPlay(container);
            } else {
                header.style.display = 'flex';
                document.getElementById('header-title').innerText = gameTitle;
                const teamSelect = document.getElementById('teamCountSelect');
                if (teamSelect) {
                    teamSelect.value = state.teams;
                }
                renderGameMode(container);
            }
        }
    }

    function renderSetup(container) {
        let html = `
            <div class="setup-container">
                <h2 style="color:var(--accent-gold); text-align:center; font-size:2em; margin-top:0;">Game Setup Dashboard</h2>
                <div class="setup-header-fields">
                    <label>Main Title: <input type="text" id="setup-title" value="${gameTitle.replace(/"/g, '&quot;')}"></label>
                    <label>Subheading: <input type="text" id="setup-subtitle" value="${gameSubtitle.replace(/"/g, '&quot;')}"></label>
                    <label style="margin-top: 10px;">Splash Screen Image: <input type="file" id="setup-image" accept="image/*" onchange="handleImageUpload(event)" style="border: none; background: transparent; padding: 5px 0;"></label>
                    <img id="image-preview" src="${gameImage || ''}" style="max-height: 150px; border-radius: 4px; display: ${gameImage ? 'block' : 'none'}; margin-top: 10px; border: 2px solid var(--accent-cyan);">
                    
                    <label style="margin-top:10px;">Default Team Names:
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                            ${state.teamNames.map((n, i) => `<input type="text" class="team-name-input" value="${n.replace(/"/g, '&quot;')}" placeholder="Team ${i+1}">`).join('')}
                        </div>
                    </label>
                </div>
                <div id="setup-rounds-container">`;
        
        rounds.forEach((round, rIndex) => {
            html += `
                <div class="prep-round" data-index="${rIndex}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <h3 style="margin:0;">Round ${rIndex + 1}</h3>
                        <button onclick="deleteRound(${rIndex})" style="border-color:red; color:red;">Delete Round</button>
                    </div>
                    <input type="text" class="q-input" value="${round.question.replace(/"/g, '&quot;')}" placeholder="Enter question...">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">`;
            for(let i=0; i<8; i++){
                let ans = round.answers[i] || { text: '', points: 0 };
                html += `
                    <div class="prep-answer-row">
                        <span style="display:inline-block; width: 20px;">${i+1}.</span>
                        <input type="text" class="a-text" value="${ans.text.replace(/"/g, '&quot;')}" placeholder="Answer">
                        <input type="number" class="a-pts" step="any" value="${ans.points}" placeholder="Pts">
                    </div>`;
            }
            html += `</div></div>`;
        });
        
        html += `
                </div>
                <div style="display:flex; flex-direction:column; gap:20px; margin-top:30px;">
                    <button class="btn-gold" style="font-size:1.2em; padding:10px;" onclick="addRound()">+ Add New Round</button>
                    <div style="display:flex; gap: 20px;">
                        <button style="flex:1; background:#0033aa; border:2px solid var(--accent-gold); color:white; font-size:1.5em; padding:15px; text-transform:uppercase; cursor:pointer;" onclick="toggleSetup()">▶️ Play / Resume Game</button>
                        <button style="flex:1; background:#009900; border:2px solid #00ff00; color:white; font-size:1.5em; padding:15px; text-transform:uppercase; cursor:pointer;" onclick="exportGame()">⬇️ Download Game</button>
                    </div>
                </div>
            </div>`;
        container.innerHTML = html;
    }
    
    function renderSplash(container) {
        let imgHTML = gameImage ? `<img class="splash-image" src="${gameImage}" alt="Game Cover Image">` : '';
        container.innerHTML = `
            <div class="splash-container">
                ${imgHTML}
                <h1>${gameTitle}</h1>
                <h2>${gameSubtitle}</h2>
                <button class="btn-gold" style="font-size:2em; padding:15px 40px; margin-top:10px; text-transform:uppercase;" onclick="goToHowToPlay()">How to Play</button>
            </div>`;
    }

    function renderHowToPlay(container) {
        container.innerHTML = `
            <div class="htp-container">
                <h1>Rules of the Game</h1>
                <div class="htp-rules">
                    <ul>
                        <li><strong>See the Board:</strong> You will see a question and eight hidden answers ranked by popularity.</li>
                        <li><strong>The Face-Off:</strong> Teams buzz in to guess the top answer.</li>
                        <li><strong>Control the Board:</strong> The team that guesses the highest-ranked answer chooses to either play or pass the question.</li>
                        <li><strong>Reveal the Answers:</strong> The playing team keeps guessing the remaining hidden answers to build up points.</li>
                        <li><strong>Strikes & Steals:</strong> If a team guesses incorrectly (a strike), play passes to the next team to steal the remaining points.</li>
                        <li><strong>Win the Game:</strong> The team with the most points at the end wins!</li>
                    </ul>
                </div>
                <button class="btn-gold" style="font-size:2em; padding:15px 40px; margin-top:30px; text-transform:uppercase;" onclick="startGame()">Start Game</button>
            </div>`;
    }

    function renderGameMode(container) {
        const round = rounds[state.currentRound];
        if(!round) return;

        let controlsHTML = `
            <div class="game-header">
                <h2>${round.question}</h2>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <select onchange="selectRound(this.value)">
                        ${rounds.map((r, i) => `<option value="${i}" ${i === state.currentRound ? 'selected' : ''}>Round ${i + 1}</option>`).join('')}
                    </select>
                    <button class="btn-strike" onclick="triggerStrike()">❌ STRIKE ❌</button>
                </div>
            </div>`;
        
        let boardHTML = `<div class="board">`;
        for (let i = 0; i < 8; i++) {
            const ans = round.answers[i];
            const isRevealed = state.boardState[i].revealed;
            const awarded = state.boardState[i].awardedTo;
            const isEmpty = !ans || !ans.text.trim();

            if (isEmpty && !isRevealed) {
                 boardHTML += `<div class="tile" style="visibility: hidden;"></div>`;
                 continue;
            }

            if (!isRevealed) {
                boardHTML += `
                    <div class="tile" onclick="revealTile(${i})">
                        <div class="tile-hidden">${i + 1}</div>
                    </div>`;
            } else {
                let awardBtns = '';
                if (!awarded) {
                    awardBtns = `<div class="award-overlay active-overlay"><p>Award to:</p>`;
                    for(let t=0; t<state.teams; t++){
                        awardBtns += `<button class="team-btn" onclick="awardPoints(${i}, ${t}, ${ans.points}, event)">${state.teamNames[t]}</button>`;
                    }
                    awardBtns += `</div>`;
                }
                
                let awardedTag = awarded ? `<div class="awarded-tag">Points to ${state.teamNames[awarded-1]}</div>` : '';

                boardHTML += `
                    <div class="tile">
                        <div class="tile-revealed">
                            <div class="tile-text">${ans.text}</div>
                            <div class="tile-points">${ans.points}</div>
                        </div>
                        ${awardBtns}
                        ${awardedTag}
                    </div>`;
            }
        }
        boardHTML += `</div>`;

        let scoreHTML = `<div class="scoreboard">`;
        for(let i = 0; i < state.teams; i++) {
            scoreHTML += `
                <div class="team-score">
                    <div class="team-name" onclick="editTeamName(${i})">${state.teamNames[i]}</div>
                    <div class="team-points">${state.scores[i]}</div>
                    <div class="score-adj">
                        <button onclick="manualScoreAdj(${i}, -1)">-1</button>
                        <button onclick="manualScoreAdj(${i}, 1)">+1</button>
                    </div>
                </div>`;
        }
        scoreHTML += `</div>`;

        container.innerHTML = controlsHTML + boardHTML + scoreHTML;
    }

    render();
</script>
</body>
</html>
